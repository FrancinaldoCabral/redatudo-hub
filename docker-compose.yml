version: '3.8'

services:
  api:
    build:
      context: ./app-hub-server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ./app-hub-server/tmp:/app/tmp

  frontend:
    build:
      context: ./app-hub
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
