version: '3.8'

services:
  # Backend API Server
  api:
    build:
      context: ./app-hub-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      MONGO_URL: ${MONGO_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL}
      MINIO_SERVER_HOST: ${MINIO_SERVER_HOST}
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTROPIC_KEY: ${ANTROPIC_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REPLICATE_KEY: ${REPLICATE_KEY}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      GOOGLE_KEY: ${GOOGLE_KEY}
      ELEVENLABS_KEY: ${ELEVENLABS_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_SUBSCRIPTION_PRICE_ID: ${STRIPE_SUBSCRIPTION_PRICE_ID}
      STRIPE_CREDITS_PRICE_ID: ${STRIPE_CREDITS_PRICE_ID}
      CONVERTIO_API_KEY: ${CONVERTIO_API_KEY}
      LOCALHOST: ${LOCALHOST}
      ORIGIN_HOST: ${ORIGIN_HOST}
      CLIENT_URL: ${CLIENT_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      HOST: ${HOST}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      QDRANT_KEY: ${QDRANT_KEY}
      WOOCOMMERCE_SECRET: ${WOOCOMMERCE_SECRET}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
      WC_HASH_SECRET: ${WC_HASH_SECRET}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_USER: ${SMTP_USER}
      SMTP_CONSUMER_KEY: ${SMTP_CONSUMER_KEY}
      SMPT_CONSUMER_SECRET: ${SMPT_CONSUMER_SECRET}
      SUBSCRIPTION_PRODUCT_ID: ${SUBSCRIPTION_PRODUCT_ID}
      CREDITS_PRODUCT_ID: ${CREDITS_PRODUCT_ID}
      DOCX_CONVERTER_URL: ${DOCX_CONVERTER_URL}
    ports:
      - "5000:5000"
    volumes:
      - ./app-hub-server/tmp:/app/tmp

  # Frontend Angular App
  frontend:
    build:
      context: ./app-hub
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
