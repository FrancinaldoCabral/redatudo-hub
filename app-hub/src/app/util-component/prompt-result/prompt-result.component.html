<div class="card m-1 mt-3 bg-light">
  <h6 class="card-header text-end" (click)="copiar()" style="cursor: pointer;">
    <span *ngIf="!copied">Copy <i class="bi bi-clipboard" ></i></span>
    <span *ngIf="copied"><strong>Copied</strong> <i class="bi bi-clipboard-fill" ></i></span>
  </h6>
  <div class="card-body resultBodyText" *ngFor="let item of parseText(inputText)" contenteditable="true">
    <span  *ngIf="item.format && item.format=='simple'">
      <p style="text-align: justify;">{{item.content}}</p>
    </span>
    <span *ngIf="item.format && item.format!=='simple'" style="width: 100%; height: 100%;" >
      <p style="text-align: justify;">
        <textarea highlight-js [lang]="item.format" style="width: 100%; height: 100%;" >{{item.content}}</textarea>
      </p>
    </span>
  </div>
</div>
