<div class="redatudo-loader-bg">
    <div class="redatudo-loader-content">
      <img
        src="https://redatudo.online/wp-content/uploads/2025/04/logotipo-redatudo-sem-fundo.png"
        alt="Redatudo Logo"
        class="redatudo-logo"
        draggable="false"
      />
      <div class="redatudo-loader-title">
        Redatudo
      </div>
      <div class="redatudo-loader-copy">
        Plataforma de IA para criar, pesquisar e transformar conteúdo.<br>
        <span #typingTextEl class="redatudo-loader-typing" [style.width.px]="typingWidth">
            {{ typingText }}
        </span>
      </div>
    </div>
  </div>
